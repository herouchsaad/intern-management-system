# ===============================================================================
# CI/CD Pipeline — Intern Management System
#
# JOBS:
#   1. ci-backend     -> Install deps + TypeScript type-check
#   2. ci-frontend    -> Install deps + production build
#   3. docker-check   -> Build both Docker images locally (no push)
#   4. publish        -> Build & push images to GHCR  [main branch only]
#   5. deploy         -> SSH into server & docker compose up  [main branch only]
#
# Required GitHub Secrets (Settings -> Secrets -> Actions):
#   - DEPLOY_HOST              VPS/server IP or hostname
#   - DEPLOY_USER              SSH username (e.g. ubuntu, root)
#   - DEPLOY_KEY               SSH private key (PEM format)
#   - DEPLOY_PATH              Absolute path on server (e.g. /opt/ims)
#   - DATABASE_PASSWORD        Postgres password for production
#   - ACCESS_TOKEN_SECRET      JWT access secret
#   - REFRESH_TOKEN_SECRET     JWT refresh secret
#   - GMAIL_APP_PASSWORD       (optional) Gmail SMTP password
#   - GOOGLE_CALENDAR_API_KEY  Google Calendar API key
# ===============================================================================

name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE_NAME: ${{ github.repository_owner }}/ims-backend
  FRONTEND_IMAGE_NAME: ${{ github.repository_owner }}/ims-frontend

# --- Cancel redundant runs on the same branch ---
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ==============================================================================
jobs:

  # --- JOB 1: Backend CI -------------------------------------------------------
  ci-backend:
    name: "Backend — Install & Type-check"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: intern-management-system-backend/package-lock.json

      - name: Install dependencies
        working-directory: intern-management-system-backend
        run: npm ci

      - name: TypeScript type-check (no emit)
        working-directory: intern-management-system-backend
        run: npx tsc --noEmit

  # --- JOB 2: Frontend CI ------------------------------------------------------
  ci-frontend:
    name: "Frontend — Install & Build"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: intern-management-system-frontend/package-lock.json

      - name: Install dependencies
        working-directory: intern-management-system-frontend
        run: npm ci

      - name: Build production bundle
        working-directory: intern-management-system-frontend
        run: npm run build
        env:
          # CI=false prevents CRA from treating warnings as errors
          CI: false
          REACT_APP_PROXY: ""
          REACT_APP_API_KEY: ${{ secrets.GOOGLE_CALENDAR_API_KEY }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build-${{ github.sha }}
          path: intern-management-system-frontend/build/
          retention-days: 7

  # --- JOB 3: Docker Build Check (PR gate) -------------------------------------
  docker-check:
    name: "Docker — Validate Image Builds"
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image (local — no push)
        uses: docker/build-push-action@v5
        with:
          context: ./intern-management-system-backend
          file: ./intern-management-system-backend/Dockerfile
          push: false
          tags: backend:ci-check
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build frontend image (local — no push)
        uses: docker/build-push-action@v5
        with:
          context: ./intern-management-system-frontend
          file: ./intern-management-system-frontend/Dockerfile
          push: false
          tags: frontend:ci-check
          build-args: |
            REACT_APP_PROXY=
            REACT_APP_API_KEY=${{ secrets.GOOGLE_CALENDAR_API_KEY }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  # --- JOB 4: Publish Docker Images to GHCR ------------------------------------
  publish:
    name: "Publish — Build & Push to GHCR"
    needs: [ci-backend, ci-frontend, docker-check]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    outputs:
      backend_image: ${{ steps.prep.outputs.backend_image }}
      frontend_image: ${{ steps.prep.outputs.frontend_image }}
      image_tag: ${{ steps.prep.outputs.image_tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare lowercase image names & short SHA tag
        id: prep
        run: |
          BACKEND_IMG=$(echo "${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')
          FRONTEND_IMG=$(echo "${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "backend_image=${BACKEND_IMG}"   >> $GITHUB_OUTPUT
          echo "frontend_image=${FRONTEND_IMG}" >> $GITHUB_OUTPUT
          echo "image_tag=${SHORT_SHA}"         >> $GITHUB_OUTPUT

      - name: Extract Docker metadata — Backend
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.prep.outputs.backend_image }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=,suffix=,format=short

      - name: Extract Docker metadata — Frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.prep.outputs.frontend_image }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=,suffix=,format=short

      - name: Build & push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./intern-management-system-backend
          file: ./intern-management-system-backend/Dockerfile
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build & push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./intern-management-system-frontend
          file: ./intern-management-system-frontend/Dockerfile
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          build-args: |
            REACT_APP_PROXY=
            REACT_APP_API_KEY=${{ secrets.GOOGLE_CALENDAR_API_KEY }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: Job summary
        run: |
          echo "## Published Docker Images" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Image    | Tags |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| Backend  | \`latest\`, \`${{ steps.prep.outputs.image_tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | \`latest\`, \`${{ steps.prep.outputs.image_tag }}\` |" >> $GITHUB_STEP_SUMMARY

  # --- JOB 5: Deploy to Production Server via SSH ------------------------------
  deploy:
    name: "Deploy — SSH into Server"
    needs: publish
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    environment:
      name: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create production .env on runner
        run: |
          cat > .env <<EOF
          DATABASE_NAME=ims_db
          DATABASE_USER=postgres
          DATABASE_PASSWORD=${{ secrets.DATABASE_PASSWORD }}
          ACCESS_TOKEN_SECRET=${{ secrets.ACCESS_TOKEN_SECRET }}
          REFRESH_TOKEN_SECRET=${{ secrets.REFRESH_TOKEN_SECRET }}
          GMAIL_APP_PASSWORD=${{ secrets.GMAIL_APP_PASSWORD }}
          GOOGLE_CALENDAR_API_KEY=${{ secrets.GOOGLE_CALENDAR_API_KEY }}
          EOF

      - name: Copy .env to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          source: ".env"
          target: ${{ secrets.DEPLOY_PATH }}
          overwrite: true

      - name: Copy docker-compose.yml to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          source: "docker-compose.yml"
          target: ${{ secrets.DEPLOY_PATH }}
          overwrite: true

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}

            echo "Logging into GHCR..."
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            echo "Pulling latest images..."
            docker compose pull

            echo "Recreating containers..."
            docker compose up -d --remove-orphans

            echo "Pruning old images..."
            docker image prune -f

            echo "Deployment complete!"
            docker compose ps

      - name: Job summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Server**: \`${{ secrets.DEPLOY_HOST }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered by**: @${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: Success" >> $GITHUB_STEP_SUMMARY
