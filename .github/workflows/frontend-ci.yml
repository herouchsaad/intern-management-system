name: Frontend CI

on:
  push:
    branches:
      - main
    paths:
      - 'intern-management-system-frontend/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'intern-management-system-frontend/**'
      - '.github/workflows/frontend-ci.yml'

jobs:
  build:
    name: Build & Docker Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: intern-management-system-frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: intern-management-system-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build React app
        run: npm run build
        env:
          CI: false

      - name: Build Docker image
        run: docker build -t ims-frontend:ci .
