server {
    listen 80;
    server_name localhost;

    # ─── Dossier racine des fichiers statiques React ───────────────────────────
    root /usr/share/nginx/html;
    index index.html;

    # ─── Compression gzip (réduction taille des réponses) ─────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml;
    gzip_min_length 256;

    # ─── Proxy vers le Backend Express ────────────────────────────────────────
    # Toutes les requêtes commençant par /api/, /auth/, /refresh/, /logout/
    # sont redirigées vers le conteneur backend sur le réseau Docker interne.
    # "backend" est le nom du service dans docker-compose.yml
    location /api {
        proxy_pass http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # Timeout pour les uploads de fichiers (CVs, photos)
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        client_max_body_size 50m;
    }

    location /auth {
        proxy_pass http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Cookie $http_cookie;
    }

    location /refresh {
        proxy_pass http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Cookie $http_cookie;
    }

    location /logout {
        proxy_pass http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Cookie $http_cookie;
    }

    location ^~ /uploads {
        proxy_pass http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # ─── React SPA — Toutes les autres routes vers index.html ─────────────────
    # Nécessaire pour que React Router fonctionne correctement
    # Ex: /interns, /profile, /login → renvoie toujours index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ─── Cache des assets statiques (JS, CSS, images) ─────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
